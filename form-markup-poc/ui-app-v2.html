<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALIS Form Markup - Smart Detection UI</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            color-scheme: light;
            --alis-gold: #FDB913;
            --alis-orange: #FF9500;
            --alis-red: #FF5722;
            --alis-gray: #4A4A4A;
            --alis-light-gray: #F5F5F5;
        }

        .signer-resident { background-color: #E0F7FA; border-left: 4px solid #0288D1; color: var(--alis-gray); }
        .signer-physician { background-color: #F3E5F5; border-left: 4px solid #7B1FA2; color: var(--alis-gray); }
        .signer-staff { background-color: #E8F5E9; border-left: 4px solid #388E3C; color: var(--alis-gray); }
        .signer-responsible_party { background-color: #FFF3E0; border-left: 4px solid #E65100; color: var(--alis-gray); }
        .signer-unassigned { background-color: #F5F5F5; border-left: 4px solid #9E9E9E; color: var(--alis-gray); }

        .signer-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 0.375rem;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .signer-resident-badge { background-color: #0288D1; color: white; }
        .signer-physician-badge { background-color: #7B1FA2; color: white; }
        .signer-staff-badge { background-color: #388E3C; color: white; }
        .signer-responsible_party-badge { background-color: #E65100; color: white; }
        .signer-unassigned-badge { background-color: #9E9E9E; color: white; }

        .field-type-badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            background-color: var(--alis-light-gray);
            color: var(--alis-gray);
            font-weight: 500;
        }

        .field-type-text { background-color: #E3F2FD; color: #1565C0; }
        .field-type-signature { background-color: #F3E5F5; color: #6A1B9A; }
        .field-type-checkbox { background-color: #E8F5E9; color: #2E7D32; }
        .field-type-radio { background-color: #FFF3E0; color: #E65100; }

        .table-container {
            max-height: 700px;
            overflow-y: auto;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
        }

        .sticky-header {
            position: sticky;
            top: 0;
            background-color: #f9fafb;
            z-index: 10;
            border-bottom: 2px solid var(--alis-orange);
        }

        .page-tabs {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding: 1rem;
            background-color: white;
            border-radius: 0.5rem;
            border: 1px solid #e5e7eb;
        }

        .page-tab {
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            border: 1px solid #e5e7eb;
            background-color: var(--alis-light-gray);
            color: var(--alis-gray);
            cursor: pointer;
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .page-tab.active {
            background-color: var(--alis-orange);
            color: white;
            border-color: var(--alis-orange);
        }

        .page-tab:hover:not(.active) {
            background-color: var(--alis-gold);
            color: var(--alis-gray);
        }

        .editable-anchor {
            cursor: pointer;
            position: relative;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            transition: all 0.2s;
        }

        .editable-anchor:hover {
            background-color: var(--alis-light-gray);
        }

        .editable-anchor.editing {
            background-color: var(--alis-gold);
        }

        .signer-management {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .signer-card {
            padding: 1rem;
            border-radius: 0.5rem;
            border: 2px solid #e5e7eb;
            transition: all 0.2s;
        }

        .signer-card.active {
            border-color: var(--alis-orange);
            background-color: var(--alis-light-gray);
        }

        .signer-card:hover {
            border-color: var(--alis-orange);
        }

        .signer-color-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 0.5rem;
        }

        .copy-button {
            opacity: 0;
            transition: opacity 0.2s;
            cursor: pointer;
        }

        tr:hover .copy-button {
            opacity: 1;
        }

        .progress-bar {
            background: linear-gradient(90deg, var(--alis-red), var(--alis-orange), var(--alis-gold));
            height: 4px;
            border-radius: 2px;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useCallback, useMemo } = React;

        function ALISFormMarkupUI() {
            const [uploadedFile, setUploadedFile] = useState(null);
            const [processing, setProcessing] = useState(false);
            const [results, setResults] = useState(null);
            const [formTemplate, setFormTemplate] = useState('move-in-assessment-v1');
            const [searchRadius, setSearchRadius] = useState(100);
            const [filterStatus, setFilterStatus] = useState('all');
            const [filterSigner, setFilterSigner] = useState('all');
            const [filterPage, setFilterPage] = useState('all');
            const [sortBy, setSortBy] = useState('field_id');
            const [userActions, setUserActions] = useState({});
            const [signerAssignments, setSignerAssignments] = useState({});
            const [editingAnchor, setEditingAnchor] = useState(null);
            const [editingAnchorValue, setEditingAnchorValue] = useState('');
            const fileInputRef = useRef(null);
            const dragOverRef = useRef(false);

            const signers = [
                { id: 'resident', label: 'Resident', color: '#0288D1' },
                { id: 'physician', label: 'Physician', color: '#7B1FA2' },
                { id: 'staff', label: 'Staff', color: '#388E3C' },
                { id: 'responsible_party', label: 'Responsible Party', color: '#E65100' },
                { id: 'unassigned', label: 'Unassigned', color: '#9E9E9E' }
            ];

            const fieldTypes = ['text', 'signature', 'checkbox', 'radio'];

            const formTemplates = [
                { id: 'move-in-assessment-v1', name: 'Move-In Assessment v1' },
                { id: 'intake-assessment-v1', name: 'Intake Assessment v1' },
                { id: 'discharge-summary-v1', name: 'Discharge Summary v1' },
            ];

            const processFile = useCallback(async () => {
                if (!uploadedFile) return;
                setProcessing(true);
                await new Promise(resolve => setTimeout(resolve, 2000));

                const mockResults = {
                    timestamp: new Date().toISOString(),
                    input: { pdf: uploadedFile.name, formTemplate, searchRadius },
                    summary: {
                        total_fields: 45,
                        matched_fields: 42,
                        unmatched_fields: 3,
                        auto_approve: 38,
                        approve_likely: 3,
                        review_needed: 1,
                        manual_review: 3,
                        average_confidence: 0.92
                    },
                    suggestions: generateMockSuggestions(),
                    total_pages: 3
                };

                setResults(mockResults);
                setUserActions({});
                setSignerAssignments({});
                setProcessing(false);
            }, [uploadedFile, formTemplate, searchRadius]);

            const generateMockSuggestions = () => {
                const commonLabels = [
                    { label: 'Resident Name', code: 'alis.resident.full_name', confidence: 0.99, type: 'text', signer: 'resident' },
                    { label: 'Date of Birth', code: 'alis.resident.dob', confidence: 0.98, type: 'text', signer: 'resident' },
                    { label: 'Phone Number', code: 'alis.resident.phone', confidence: 0.95, type: 'text', signer: 'resident' },
                    { label: 'Assessment Date', code: 'generic.date_assessment.1', confidence: 0.96, type: 'text', signer: 'staff' },
                    { label: 'Allergies', code: 'generic.text_allergies.1', confidence: 0.97, type: 'text', signer: 'resident' },
                    { label: 'Medications', code: 'generic.text_medication.1', confidence: 0.88, type: 'text', signer: 'staff' },
                    { label: 'Physician Signature', code: 'generic.signature_physician.1', confidence: 0.99, type: 'signature', signer: 'physician' },
                    { label: 'Staff Signature', code: 'generic.signature_staff.1', confidence: 0.98, type: 'signature', signer: 'staff' },
                    { label: 'Wheelchair', code: 'generic.check_wheelchair.1', confidence: 0.99, type: 'checkbox', signer: 'staff' },
                    { label: 'DNR', code: 'generic.check_dnr.1', confidence: 0.97, type: 'checkbox', signer: 'physician' },
                ];

                const suggestions = [];
                for (let i = 0; i < 45; i++) {
                    const mock = commonLabels[i % commonLabels.length];
                    const page = Math.floor(i / 15) + 1;
                    const confidence = i < 38 ? 0.85 + Math.random() * 0.15 : 0.50 + Math.random() * 0.45;
                    const status = confidence >= 0.95 ? 'auto_approve' :
                                  confidence >= 0.80 ? 'approve_likely' :
                                  confidence >= 0.70 ? 'review_needed' : 'manual_review';

                    suggestions.push({
                        field_id: `field_${i}`,
                        detected_label: mock.label,
                        suggested_code: confidence > 0.7 ? mock.code : null,
                        confidence: confidence,
                        match_type: 'exact',
                        status: status,
                        field_type: mock.type,
                        anchor_name: mock.code?.split('.').pop() || 'unknown',
                        page: page,
                        default_signer: mock.signer,
                        properties: {
                            hover_text: `${mock.label}-${i}`,
                            read_only: confidence > 0.9,
                            required: confidence > 0.95
                        }
                    });
                }

                return suggestions;
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                dragOverRef.current = true;
            };

            const handleDrop = (e) => {
                e.preventDefault();
                dragOverRef.current = false;
                const files = e.dataTransfer.files;
                if (files.length > 0 && files[0].type === 'application/pdf') {
                    setUploadedFile(files[0]);
                    setResults(null);
                }
            };

            const handleFileSelect = (e) => {
                if (e.target.files && e.target.files[0]) {
                    setUploadedFile(e.target.files[0]);
                    setResults(null);
                }
            };

            const filteredSuggestions = useMemo(() => {
                if (!results) return [];

                let filtered = results.suggestions.filter(s => {
                    if (filterStatus !== 'all' && s.status !== filterStatus) return false;
                    if (filterPage !== 'all' && s.page !== parseInt(filterPage)) return false;
                    if (filterSigner !== 'all') {
                        const assignedSigner = signerAssignments[s.field_id] || s.default_signer;
                        if (assignedSigner !== filterSigner) return false;
                    }
                    return true;
                });

                filtered.sort((a, b) => {
                    switch(sortBy) {
                        case 'page':
                            return a.page - b.page || a.field_id.localeCompare(b.field_id);
                        case 'signer':
                            const signerA = signerAssignments[a.field_id] || a.default_signer;
                            const signerB = signerAssignments[b.field_id] || b.default_signer;
                            return signerA.localeCompare(signerB);
                        case 'confidence_desc':
                            return b.confidence - a.confidence;
                        default:
                            return a.field_id.localeCompare(b.field_id);
                    }
                });

                return filtered;
            }, [results, filterStatus, filterSigner, filterPage, sortBy, signerAssignments]);

            const getPages = () => {
                if (!results) return [];
                const pages = new Set(results.suggestions.map(s => s.page));
                return Array.from(pages).sort((a, b) => a - b);
            };

            const getSuggestionsByPage = (page) => {
                if (!results) return 0;
                return results.suggestions.filter(s => s.page === page).length;
            };

            const getSigner = (fieldId) => {
                return signerAssignments[fieldId] || results.suggestions.find(s => s.field_id === fieldId)?.default_signer || 'unassigned';
            };

            const getSiggerColor = (signer) => {
                return signers.find(s => s.id === signer)?.color || '#9E9E9E';
            };

            const bulkAssignSigner = (toSigner) => {
                const newAssignments = {};
                filteredSuggestions.forEach(s => {
                    newAssignments[s.field_id] = toSigner;
                });
                setSignerAssignments(prev => ({ ...prev, ...newAssignments }));
            };

            const startEditAnchor = (fieldId, currentValue) => {
                setEditingAnchor(fieldId);
                setEditingAnchorValue(currentValue);
            };

            const saveAnchorEdit = (fieldId, newValue) => {
                setSignerAssignments(prev => ({
                    ...prev,
                    [`anchor_${fieldId}`]: newValue
                }));
                setEditingAnchor(null);
            };

            const downloadJSON = () => {
                if (!results) return;

                const output = {
                    ...results,
                    userApprovals: userActions,
                    signerAssignments: signerAssignments
                };

                const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/json' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `alis-suggestions-${Date.now()}.json`;
                a.click();
                window.URL.revokeObjectURL(url);
            };

            const counts = useMemo(() => {
                if (!results) return { approved: 0, pending: 0, rejected: 0 };
                const approved = Object.values(userActions).filter(a => a === 'approved').length;
                const rejected = Object.values(userActions).filter(a => a === 'rejected').length;
                const pending = results.suggestions.length - approved - rejected;
                return { approved, pending, rejected };
            }, [results, userActions]);

            return (
                <div className="min-h-screen" style={{ backgroundColor: '#FAFAF9' }}>
                    {/* Header */}
                    <div className="border-b shadow-sm" style={{ background: 'linear-gradient(135deg, var(--alis-orange) 0%, var(--alis-red) 100%)' }}>
                        <div className="max-w-7xl mx-auto px-6 py-8">
                            <h1 className="text-3xl font-bold text-white">ALIS Form Markup</h1>
                            <p className="text-orange-50 mt-1">Smart Form Field Detection, Signer Management & Compliance Tracking</p>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto px-6 py-8">
                        {/* Upload Section */}
                        <div className="bg-white rounded-lg border-2 border-dashed border-slate-300 p-8 mb-8 transition-all hover:border-orange-400"
                             onDragOver={handleDragOver}
                             onDragLeave={handleDrop}
                             onDrop={handleDrop}>
                            <div className="text-center">
                                <svg className="mx-auto h-12 w-12 text-slate-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                                    <path d="M28 8H12a4 4 0 00-4 4v20a4 4 0 004 4h24a4 4 0 004-4V20m-6-12v12m0 0l-3-3m3 3l3-3" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                                </svg>
                                <h3 className="mt-4 text-lg font-semibold text-slate-900">Upload PDF Form</h3>
                                <p className="text-slate-600 mt-1">Drag and drop or click to select a Tungsten-marked PDF</p>
                                <input ref={fileInputRef} type="file" accept=".pdf" onChange={handleFileSelect} className="hidden" />
                                <button
                                    onClick={() => fileInputRef.current?.click()}
                                    className="mt-4 px-4 py-2 text-white rounded-lg transition-colors"
                                    style={{ backgroundColor: 'var(--alis-orange)' }}
                                    onMouseEnter={(e) => e.target.style.backgroundColor = 'var(--alis-red)'}
                                    onMouseLeave={(e) => e.target.style.backgroundColor = 'var(--alis-orange)'}
                                >
                                    Select PDF
                                </button>
                            </div>

                            {uploadedFile && (
                                <div className="mt-6 p-4 bg-blue-50 rounded-lg border border-blue-200">
                                    <p className="text-sm font-medium text-blue-900">
                                        📄 {uploadedFile.name} ({(uploadedFile.size / 1024 / 1024).toFixed(2)} MB)
                                    </p>
                                </div>
                            )}
                        </div>

                        {/* Configuration Section */}
                        {uploadedFile && !results && (
                            <div className="bg-white rounded-lg shadow p-6 mb-8">
                                <h2 className="text-lg font-semibold text-slate-900 mb-4">Configuration</h2>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-2">Form Template</label>
                                        <select value={formTemplate} onChange={(e) => setFormTemplate(e.target.value)} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500">
                                            {formTemplates.map(t => (
                                                <option key={t.id} value={t.id}>{t.name}</option>
                                            ))}
                                        </select>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-2">OCR Search Radius: {searchRadius}px</label>
                                        <input type="range" min="50" max="300" value={searchRadius} onChange={(e) => setSearchRadius(parseInt(e.target.value))} className="w-full" />
                                    </div>
                                </div>

                                <button
                                    onClick={processFile}
                                    disabled={processing}
                                    className="mt-6 w-full py-3 text-white font-semibold rounded-lg transition-colors disabled:bg-gray-400"
                                    style={{ backgroundColor: processing ? '#ccc' : 'var(--alis-orange)' }}
                                    onMouseEnter={(e) => !processing && (e.target.style.backgroundColor = 'var(--alis-red)')}
                                    onMouseLeave={(e) => !processing && (e.target.style.backgroundColor = 'var(--alis-orange)')}
                                >
                                    {processing ? 'Processing...' : 'Run Analysis'}
                                </button>

                                {processing && (
                                    <div className="mt-4">
                                        <div className="progress-bar">
                                            <div style={{ width: '100%', height: '100%', animation: 'pulse 1.5s infinite' }}></div>
                                        </div>
                                        <p className="text-sm text-slate-600 mt-2 text-center">
                                            Detecting fields • Extracting labels • Matching codes...
                                        </p>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Results Section */}
                        {results && (
                            <div className="space-y-6">
                                {/* Summary Stats */}
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                    <div className="bg-white rounded-lg shadow p-6 border-l-4" style={{ borderColor: 'var(--alis-gray)' }}>
                                        <p className="text-sm font-medium text-slate-600">Total Fields</p>
                                        <p className="text-3xl font-bold text-slate-900 mt-2">{results.summary.total_fields}</p>
                                    </div>
                                    <div className="bg-white rounded-lg shadow p-6 border-l-4" style={{ borderColor: 'var(--alis-gold)' }}>
                                        <p className="text-sm font-medium text-slate-600">Matched</p>
                                        <p className="text-3xl font-bold text-slate-900 mt-2">{results.summary.matched_fields}</p>
                                        <p className="text-xs text-slate-500 mt-1">({((results.summary.matched_fields / results.summary.total_fields) * 100).toFixed(0)}%)</p>
                                    </div>
                                    <div className="bg-white rounded-lg shadow p-6 border-l-4" style={{ borderColor: 'var(--alis-orange)' }}>
                                        <p className="text-sm font-medium text-slate-600">Auto-Approve</p>
                                        <p className="text-3xl font-bold text-slate-900 mt-2">{results.summary.auto_approve}</p>
                                        <p className="text-xs text-slate-500 mt-1">({((results.summary.auto_approve / results.summary.total_fields) * 100).toFixed(0)}%)</p>
                                    </div>
                                    <div className="bg-white rounded-lg shadow p-6 border-l-4" style={{ borderColor: 'var(--alis-red)' }}>
                                        <p className="text-sm font-medium text-slate-600">Avg. Confidence</p>
                                        <p className="text-3xl font-bold text-slate-900 mt-2">{(results.summary.average_confidence * 100).toFixed(0)}%</p>
                                    </div>
                                </div>

                                {/* Signer Management */}
                                <div className="bg-white rounded-lg shadow p-6">
                                    <h2 className="text-lg font-semibold text-slate-900 mb-4">Signer & Compliance Management</h2>

                                    <div className="signer-management mb-6">
                                        {signers.map(signer => (
                                            <div key={signer.id} className={`signer-card ${filterSigner === signer.id ? 'active' : ''}`}
                                                 onClick={() => setFilterSigner(filterSigner === signer.id ? 'all' : signer.id)}>
                                                <div className="flex items-center mb-2">
                                                    <div className="signer-color-dot" style={{ backgroundColor: signer.color }}></div>
                                                    <span className="font-semibold text-sm">{signer.label}</span>
                                                </div>
                                                <p className="text-xs text-slate-600">
                                                    {results.suggestions.filter(s => (signerAssignments[s.field_id] || s.default_signer) === signer.id).length} fields
                                                </p>
                                                {signer.id !== 'unassigned' && (
                                                    <button
                                                        onClick={(e) => {
                                                            e.stopPropagation();
                                                            bulkAssignSigner(signer.id);
                                                        }}
                                                        className="mt-2 text-xs px-2 py-1 rounded transition-colors text-white"
                                                        style={{ backgroundColor: signer.color }}
                                                        onMouseEnter={(e) => e.target.style.opacity = '0.8'}
                                                        onMouseLeave={(e) => e.target.style.opacity = '1'}
                                                    >
                                                        Bulk Assign
                                                    </button>
                                                )}
                                            </div>
                                        ))}
                                    </div>

                                    {/* Approval Status */}
                                    <div className="grid grid-cols-3 gap-4">
                                        <div className="text-center p-4 bg-orange-50 rounded-lg">
                                            <div className="text-3xl font-bold text-orange-600">{counts.approved}</div>
                                            <p className="text-sm text-slate-600 mt-1">Approved</p>
                                        </div>
                                        <div className="text-center p-4 bg-blue-50 rounded-lg">
                                            <div className="text-3xl font-bold text-blue-600">{counts.pending}</div>
                                            <p className="text-sm text-slate-600 mt-1">Pending</p>
                                        </div>
                                        <div className="text-center p-4 bg-red-50 rounded-lg">
                                            <div className="text-3xl font-bold text-red-600">{counts.rejected}</div>
                                            <p className="text-sm text-slate-600 mt-1">Rejected</p>
                                        </div>
                                    </div>
                                </div>

                                {/* Page Navigation */}
                                {getPages().length > 0 && (
                                    <div className="bg-white rounded-lg shadow p-6">
                                        <h3 className="text-sm font-semibold text-slate-900 mb-3">Quick Navigation by Page</h3>
                                        <div className="page-tabs">
                                            <button
                                                onClick={() => setFilterPage('all')}
                                                className={`page-tab ${filterPage === 'all' ? 'active' : ''}`}
                                            >
                                                All Pages
                                            </button>
                                            {getPages().map(page => (
                                                <button
                                                    key={page}
                                                    onClick={() => setFilterPage(page.toString())}
                                                    className={`page-tab ${filterPage === page.toString() ? 'active' : ''}`}
                                                >
                                                    Page {page} ({getSuggestionsByPage(page)})
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* Filters & Bulk Actions */}
                                <div className="bg-white rounded-lg shadow p-6">
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-2">Filter by Status</label>
                                            <select value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500">
                                                <option value="all">All Statuses</option>
                                                <option value="auto_approve">🟢 Auto-Approve</option>
                                                <option value="approve_likely">🟡 Approve Likely</option>
                                                <option value="review_needed">🟠 Review Needed</option>
                                                <option value="manual_review">🔴 Manual Review</option>
                                            </select>
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-2">Sort by</label>
                                            <select value={sortBy} onChange={(e) => setSortBy(e.target.value)} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500">
                                                <option value="field_id">Field ID</option>
                                                <option value="page">Page</option>
                                                <option value="signer">Signer</option>
                                                <option value="confidence_desc">Confidence (High to Low)</option>
                                            </select>
                                        </div>

                                        <div className="flex gap-2 items-end">
                                            <button
                                                onClick={downloadJSON}
                                                className="flex-1 px-3 py-2 rounded-lg transition-colors text-sm font-medium text-white"
                                                style={{ backgroundColor: 'var(--alis-orange)' }}
                                                onMouseEnter={(e) => e.target.style.backgroundColor = 'var(--alis-red)'}
                                                onMouseLeave={(e) => e.target.style.backgroundColor = 'var(--alis-orange)'}
                                            >
                                                Download JSON
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                {/* Suggestions Table */}
                                <div className="bg-white rounded-lg shadow overflow-hidden">
                                    <div className="table-container">
                                        <table className="w-full text-sm">
                                            <thead className="sticky-header">
                                                <tr className="border-b border-slate-200">
                                                    <th className="px-3 py-3 text-left font-semibold text-slate-700 whitespace-nowrap">Page</th>
                                                    <th className="px-3 py-3 text-left font-semibold text-slate-700 whitespace-nowrap">Field ID</th>
                                                    <th className="px-3 py-3 text-left font-semibold text-slate-700 whitespace-nowrap">Type</th>
                                                    <th className="px-3 py-3 text-left font-semibold text-slate-700">Label</th>
                                                    <th className="px-3 py-3 text-left font-semibold text-slate-700">Anchor</th>
                                                    <th className="px-3 py-3 text-left font-semibold text-slate-700">Signer</th>
                                                    <th className="px-3 py-3 text-left font-semibold text-slate-700">Code</th>
                                                    <th className="px-3 py-3 text-left font-semibold text-slate-700">Conf.</th>
                                                    <th className="px-3 py-3 text-left font-semibold text-slate-700">Status</th>
                                                    <th className="px-3 py-3 text-left font-semibold text-slate-700">Action</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {filteredSuggestions.map((suggestion) => {
                                                    const currentSigner = getSigner(suggestion.field_id);
                                                    const signerObj = signers.find(s => s.id === currentSigner);
                                                    return (
                                                        <tr key={suggestion.field_id} className={`border-b border-slate-200 hover:bg-slate-50 ${`signer-${currentSigner}`}`}>
                                                            <td className="px-3 py-3 font-medium text-slate-700 whitespace-nowrap bg-white">Page {suggestion.page}</td>
                                                            <td className="px-3 py-3 font-mono text-xs text-slate-600 whitespace-nowrap bg-white">{suggestion.field_id}</td>
                                                            <td className="px-3 py-3 bg-white">
                                                                <span className={`field-type-badge field-type-${suggestion.field_type}`}>
                                                                    {suggestion.field_type}
                                                                </span>
                                                            </td>
                                                            <td className="px-3 py-3 text-slate-900 bg-white">{suggestion.detected_label || '(unknown)'}</td>
                                                            <td className="px-3 py-3 bg-white">
                                                                {editingAnchor === suggestion.field_id ? (
                                                                    <div className="flex gap-1">
                                                                        <input
                                                                            type="text"
                                                                            value={editingAnchorValue}
                                                                            onChange={(e) => setEditingAnchorValue(e.target.value)}
                                                                            className="flex-1 px-2 py-1 text-xs border border-slate-300 rounded"
                                                                            autoFocus
                                                                        />
                                                                        <button onClick={() => saveAnchorEdit(suggestion.field_id, editingAnchorValue)} className="text-xs bg-green-500 text-white px-2 py-1 rounded">✓</button>
                                                                        <button onClick={() => setEditingAnchor(null)} className="text-xs bg-red-500 text-white px-2 py-1 rounded">✕</button>
                                                                    </div>
                                                                ) : (
                                                                    <code
                                                                        className="editable-anchor text-xs"
                                                                        onClick={() => startEditAnchor(suggestion.field_id, suggestion.anchor_name)}
                                                                        title="Click to edit anchor name"
                                                                    >
                                                                        {suggestion.anchor_name}
                                                                    </code>
                                                                )}
                                                            </td>
                                                            <td className="px-3 py-3 bg-white">
                                                                <select
                                                                    value={currentSigner}
                                                                    onChange={(e) => setSignerAssignments(prev => ({ ...prev, [suggestion.field_id]: e.target.value }))}
                                                                    className="px-2 py-1 text-xs border rounded"
                                                                    style={{ borderColor: signerObj?.color || '#ccc' }}
                                                                >
                                                                    {signers.map(signer => (
                                                                        <option key={signer.id} value={signer.id}>{signer.label}</option>
                                                                    ))}
                                                                </select>
                                                            </td>
                                                            <td className="px-3 py-3 bg-white">
                                                                <code className="text-xs bg-slate-100 px-2 py-1 rounded">{suggestion.suggested_code || '—'}</code>
                                                            </td>
                                                            <td className="px-3 py-3 bg-white">
                                                                <div className="flex items-center gap-1">
                                                                    <div className="w-12 h-2 bg-slate-200 rounded-full overflow-hidden">
                                                                        <div
                                                                            className="h-full"
                                                                            style={{
                                                                                width: `${suggestion.confidence * 100}%`,
                                                                                background: 'linear-gradient(90deg, var(--alis-red), var(--alis-orange), var(--alis-gold))'
                                                                            }}
                                                                        ></div>
                                                                    </div>
                                                                    <span className="text-xs font-medium">{(suggestion.confidence * 100).toFixed(0)}%</span>
                                                                </div>
                                                            </td>
                                                            <td className="px-3 py-3 bg-white">
                                                                <span className={`confidence-badge confidence-${suggestion.status.split('_')[0]}`}>
                                                                    {suggestion.status === 'auto_approve' && '🟢'}
                                                                    {suggestion.status === 'approve_likely' && '🟡'}
                                                                    {suggestion.status === 'review_needed' && '🟠'}
                                                                    {suggestion.status === 'manual_review' && '🔴'}
                                                                </span>
                                                            </td>
                                                            <td className="px-3 py-3 bg-white">
                                                                <div className="flex gap-1">
                                                                    <button
                                                                        onClick={() => setUserActions(prev => ({ ...prev, [suggestion.field_id]: prev[suggestion.field_id] === 'approved' ? null : 'approved' }))}
                                                                        className="px-2 py-1 rounded text-xs font-medium transition-colors text-white"
                                                                        style={{
                                                                            backgroundColor: userActions[suggestion.field_id] === 'approved' ? 'var(--alis-gold)' : 'var(--alis-light-gray)',
                                                                            color: userActions[suggestion.field_id] === 'approved' ? 'var(--alis-gray)' : 'var(--alis-gray)',
                                                                            border: '1px solid var(--alis-orange)'
                                                                        }}
                                                                    >
                                                                        ✓
                                                                    </button>
                                                                    <button
                                                                        onClick={() => setUserActions(prev => ({ ...prev, [suggestion.field_id]: prev[suggestion.field_id] === 'rejected' ? null : 'rejected' }))}
                                                                        className="px-2 py-1 rounded text-xs font-medium transition-colors text-white"
                                                                        style={{
                                                                            backgroundColor: userActions[suggestion.field_id] === 'rejected' ? 'var(--alis-red)' : 'var(--alis-light-gray)',
                                                                            color: userActions[suggestion.field_id] === 'rejected' ? 'white' : 'var(--alis-gray)',
                                                                            border: '1px solid var(--alis-orange)'
                                                                        }}
                                                                    >
                                                                        ✕
                                                                    </button>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                {/* New Upload */}
                                <button
                                    onClick={() => {
                                        setResults(null);
                                        setUploadedFile(null);
                                        setUserActions({});
                                        setSignerAssignments({});
                                        setFilterPage('all');
                                        setFilterSigner('all');
                                    }}
                                    className="w-full py-3 rounded-lg transition-colors font-medium text-white"
                                    style={{
                                        backgroundColor: 'var(--alis-light-gray)',
                                        color: 'var(--alis-gray)',
                                        border: `2px solid var(--alis-orange)`
                                    }}
                                    onMouseEnter={(e) => e.target.style.backgroundColor = 'var(--alis-gold)'}
                                    onMouseLeave={(e) => e.target.style.backgroundColor = 'var(--alis-light-gray)'}
                                >
                                    Upload Another PDF
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<ALISFormMarkupUI />);
    </script>
</body>
</html>
